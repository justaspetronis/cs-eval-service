services:
  - type: web
    name: cs-eval-service
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: VINTED_PROXY_URL
        value: https://vinted-proxy-fus7.onrender.com
      - key: VINTED_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cs-eval-db
          property: connectionString

databases:
  - name: cs-eval-db
    databaseName: cs_eval
    plan: starter
